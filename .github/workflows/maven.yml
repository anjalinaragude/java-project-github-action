name: Java CI

on:
  push:
    branches: [ main ]


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml
      # If your pom.xml is in a subdirectory, specify it:
      # run: mvn -B package --file subfolder/pom.xml
